; ============================================================================
; 项目配置 — 可调参数集中处。每个 section ↔ 一个 dataclass(读法 ini('section','key',default))。
; 改这里 = 全局生效;CLI 仅暴露 per-run 路径。固定不变的实现常量已 inline 进代码,不在此。
; ============================================================================

[calendar]
; 市场时间画像 —— 引擎所有 bars-per-day / 年化 / panel 深度常量的唯一来源(markets.MarketProfile)。
; continuous24x7(crypto 永续,默认,逐位复现旧行为)| us_equity_daily(美股日线)。
profile = continuous24x7

[factor_mining]
parquet_5m_root = ./data/parquet_5m_univ4h
pool_capacity   = 24

[dsl]
; DSL 公式树 cost 上限(α-Sem-k 预算),gp_baseline 搜索空间约束。
max_cost          = 25
min_cost          = 3
max_len           = 5     ; GFN 推导 production 数上限(含 window leaf;防过拟合长树。GP 走 [gp_baseline] max_height)

[alpha_pool]
delta_floor       = 0.02       ; 最小正交贡献 Δ=|rank_ic|·(1−R²)(2026-06-22 口径统一为 rank IC,|rank_ic| 量纲);调高=只收强正交;注:0.02 偏严(admit_rankic_min=0.01 已先过滤)
r2_cap            = 0.5        ; 冗余门:R²>cap 且候选净 Sharpe≤最像成员→拒;prune 踢冗余簇内净最弱
holdout_frac      = 0.25       ; OOS holdout 边际门:末此比例 bars 用 fit 方向须真盈利才入池
cos_sim_threshold = 0.92       ; evaluator G2 结构去重(嵌入 cos)

[alpha_library]
; 跨 run 累积的正交 alpha 库(只存因子树,不存 pnl 序列)。IC 门继承 evaluator admit_rankic_min=0.01。
path     = output/alpha_library.json
corr_max = 0.5                 ; 入库/清理正交门:与已选因子 pnl |pearson| ≥此 → 冗余,拒
max_size = 500                 ; 定时清理上限:超额按 |rank_ic| 降序截断

[evaluator]
device = cuda                   ; 本地默认 cuda(T1000);上传 quant-server(torch+cpu)时改回 cpu

[neutralize]
; 统一中性化:单一配置项(逗号分隔启用项);研究 eval / val deploy / live signal 同源。
;   crowding — 候选/信号 ⊥ 拥挤子空间(funding/lsr/基差/OI);2026-06-26 证否,默认关;无此面板的市场(权益)勿开
;   beta     — 信号 ⊥ 因果滚动市场 β(系统风险正交)
;   market   — dollar-neutral 多空平衡(Σw=0);门控 signal_to_weight 的 post-clip demean
;              (topk_ls 部署构造结构性 LS,恒中性,不受此开关影响)
; 空 = 全关。改 beta/market 影响 live 决策,先 val 回测。
neutralize = beta, market

[backtest_reward]
half_spread_rate  = 0.0        ; 半点差(fraction;暂不考虑滑点 → 0)
fee_rate          = 0.00050    ; taker 单边手续费(VIP0 永续标准 5bps)
impact_Y          = 0.5        ; sqrt-impact 系数 Y·σ_5m·√(notional/bar_volume)
leverage_cap      = 2.0        ; top-K 多空 gross 目标 Σ|w|(多腿合 +cap/2、空腿合 −cap/2)
max_concentration = 0.20       ; (旧 z 加权 per-symbol clip;top-K 等权下不触及)
; top-K 多空组合构造(eval≡live 共享口径;贴 alphasage/alphacfg top-K 等权,允许做空)
top_k             = 8          ; 每腿仓数(多 top_k + 空 bottom_k = 2×top_k 仓)
swap_n            = 2          ; 每腿每 rebalance 最多换出名数(换手缓冲)
min_hold          = 4          ; 在持满 N 个决策 bar 才可被换出(换手缓冲)

; 权益回测组合构造在 Python 侧(raw_weights=1 直传最终权重)→ leverage_cap/max_concentration
; 由 [backtest_reward] 的 top-K sizing 独占,不在各市场成本段重复(去重)。
[equity_costs]
; US 权益回测(EquityPolicy);复权 OHLC 总收益口径,年化 √252。无 funding/强平/impact。
cost_rate         = 0.0005     ; 佣金+半点差单边对称(fraction;研究级,~5bps)
daily_borrow      = 0.0        ; 空腿日借券费(年化借券利率/252;0=关)

[ashare_costs]
; 中国 A 股回测(ASharePolicy);qfq 复权 OHLC 总收益口径,年化 √242。long-only,无 funding/强平。
commission        = 0.00025    ; 佣金单边(万2.5;buy+sell 对称)
stamp_tax_sell    = 0.0005     ; 印花税**卖出单边**(万5,2023-08 减半后;非对称成本核心)
transfer_fee      = 0.00001    ; 过户费双边(万0.1)
price_limit_pct   = 0.10       ; 涨跌停幅度(沪深300 主板 ±10%);用于回测 trade_block 冻结

[gp_baseline]
; DEAP 强类型 GP 因子挖掘(NSGA-II 双目标:净 Sharpe + 行为多样性);cost 上限复用 [dsl]
pop_size        = 2000    ; 种群(须被 4 整除,selTournamentDCD)
n_gen           = 40      ; 代数
cxpb            = 0.7     ; 交叉概率
mutpb           = 0.2     ; 变异概率
init_min_height = 1       ; 初始树高下限(ramped half-and-half)
init_max_height = 4       ; 初始树高上限
max_height      = 8       ; staticLimit 树高上限(防 bloat)

[alphasage]
; AlphaSAGE GFlowNet alpha-mining baseline(独立 baseline,与 GP 平级,非改进 GP)
; P(α)∝R 采样;reward = R_IC + λ(T)·R_SA + η(T)·R_NOV;RGCN 结构感知编码器;cost 上限复用 [dsl]
hidden_dim          = 64      ; RGCN encoder hidden 维(节点 embedding + 消息维)
n_layers            = 2       ; RGCN 消息传递跳数
lr                  = 0.001   ; Adam 学习率(policy/encoder)
logz_lr             = 0.1     ; logZ 单独高 lr(GFlowNet 铁律:logZ 须追 log ΣR,共用低 lr 会致 TB 发散坍缩)
batch_size          = 16      ; 每 episode 采样轨迹数
n_episodes          = 1000    ; 训练 episode 数
nov_weight          = 0.1     ; R_NOV 权重 η(与池正交新颖度;常数)
entropy_coef        = 0.01    ; 熵正则系数 β·H(π)(>0 需 save_estimator_outputs;防早熟坍缩)
entropy_temperature = 1.0     ; 熵温度
r_sa_weight         = 0.5     ; R_SA 结构稠密奖励 λ(0)(每 episode 线性退火 →0)
r_sa_k              = 16      ; R_SA kNN 结构邻居数(池内成员)
r_sa_tau            = 1.0     ; R_SA 结构相似度 softmax(−dist²/τ)温度

[trade_exchange]
mode = testnet                 ; testnet | mainnet

[trade_signal]
refresh_minutes      = 60      ; L1 alpha 信号刷新频率(min)
deploy_bundle_path   = output/alpha_pool_deploy_22alpha20.json
vt_mult              = 4.0     ; vol-target mult
target_vol           = 2.230e-3 ; train 段 vol24 中位(确定性 sizing 锚);≤0=不缩放
sizing_gross_cap     = 4.5     ; gross Σ|w| 外栏 backstop(ruin 栏)
target_leverage      = 2.0     ; sizing 杠杆:book=final/L,executor ×L 还原敞口
bootstrap_gross          = 0.0 ; 小资金自举目标 gross;0=关
bootstrap_threshold_usdt = 0.0 ; 自举回正常阈值(USDT 权益);0=关

[trade_execute]
plan_lifetime_minutes = 60     ; plan 寿命 = 1h alpha cadence
order_tick_seconds    = 180    ; L3 tick(20 tick / 1h plan)
maker_offset_bps      = 1.5
account_leverage      = 5      ; 固定 cross-margin binance 杠杆
min_qty_pct           = 0.002  ; rebalance 阈值 = max(min_notional, eq×pct)
sar_cap_frac          = 0.25   ; 单步下单 ≤ frac × 对侧前 N 档累计深度
stop_trail_pct        = 0.22   ; 自入场峰值 trailing stop;>0 启用
stop_ratchet          = 0.5:0.12,1.0:0.08  ; profit-ratchet 峰值浮盈→trail;""=关
working_capital_cap   = 0.0    ; 资金容量上限 C*(钱包超额 futures→spot 划转);0=关

[trade_risk]
per_sym_max_weight   = 0.20

[trade_panel]
cold_load_days       = 21      ; panel 深度 = cold_load_days×288 bar,须 ≥ 部署池最长 ts 窗

[trade_universe]
top_n                     = 30  ; 动态 universe = trailing qv_window_hours quoteVol top_n
qv_window_hours           = 8   ; 流动性窗(trailing Σ quoteVol,1h kline 聚合)
hold_max_persist          = 8   ; 连续掉出 top_n 满 N×rotation 才转 sell-only
rotation_interval_seconds = 3600
exclude_stable_bases = USDC,BUSD,FDUSD,TUSD,USDP,DAI,USTC,UST,LUSD,GUSD
